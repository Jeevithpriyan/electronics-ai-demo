<div class="main">

<div class="header">Microcontroller Code Generator</div>

<div class="card">

<textarea id="codereq"
placeholder="Example: Blink LED ESP32"></textarea>

<button onclick="generate()">Generate Code</button>

<div class="output" id="codeoutput">
Generated code appears here
</div>

</div>

</div>

<script>

function generate(){

document.getElementById("codeoutput").innerHTML="Generating code...";

setTimeout(function(){

document.getElementById("codeoutput").innerHTML=
"void setup(){pinMode(2,OUTPUT);} void loop(){digitalWrite(2,HIGH);}";

},1500);

}

</script>

</body>
